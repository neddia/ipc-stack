services:
  modbus-sim:
    profiles: ["sim"]
    image: local/gatewayd:dev
    build:
      context: ${SETPOINT_DIR:-../setpoint}
      dockerfile: docker/gatewayd.Dockerfile
    volumes:
      - ${SETPOINT_DIR:-../setpoint}/tools:/app/tools
    command: ["python", "/app/tools/sims/modbus_sim.py"]
    restart: unless-stopped

  fake-miner-fleet:
    profiles: ["sim"]
    image: local/gatewayd:dev
    build:
      context: ${SETPOINT_DIR:-../setpoint}
      dockerfile: docker/gatewayd.Dockerfile
    depends_on:
      gatewayd:
        condition: service_started
        restart: true
      site-agent:
        condition: service_started
        restart: true
    network_mode: "service:site-agent"
    environment:
      SITE_CONFIG_PATH: /app/storage/site-config.sim.yml
      GATEWAYD_BASE_URL: http://gatewayd:8080
      SITE_AGENT_BASE_URL: http://127.0.0.1:8000
      GATEWAYD_TOKEN: devtoken
      SIM_MINER_PORT: 4028
    volumes:
      - ${SETPOINT_DIR:-../setpoint}/tools:/app/tools
      - ${IPC_STORAGE_DIR:-../setpoint/storage}:/app/storage
    command: ["python", "/app/tools/sims/fake_cgminer_fleet.py"]
    restart: unless-stopped

  site-agent:
    image: local/site-agent:dev
    build:
      context: ${SETPOINT_DIR:-../setpoint}
      dockerfile: docker/site-agent.Dockerfile
    environment:
      SITE_CONFIG_PATH: /app/storage/site-config.sim.yml
      PROFILES_DIR: /app/storage/profiles
    volumes:
      - ${SETPOINT_DIR:-../setpoint}/site-agent:/app/site-agent
      - ${SETPOINT_DIR:-../setpoint}/ticlib:/app/ticlib
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  tailwind:
    profiles: ["ui"]
    image: local/site-agent:dev
    build:
      context: ${SETPOINT_DIR:-../setpoint}
      dockerfile: docker/site-agent.Dockerfile
    volumes:
      - ${SETPOINT_DIR:-../setpoint}/site-agent:/app/site-agent
      - ${SETPOINT_DIR:-../setpoint}/tailwind.config.js:/app/tailwind.config.js
      - ${SETPOINT_DIR:-../setpoint}/bin/tailwindcss:/app/bin/tailwindcss
    working_dir: /app
    command:
      - /app/bin/tailwindcss
      - -c
      - /app/tailwind.config.js
      - -i
      - /app/site-agent/app/static/src/tailwind.css
      - -o
      - /app/site-agent/app/static/tailwind.css
      - --watch=always
    restart: unless-stopped

  gatewayd:
    image: local/gatewayd:dev
    build:
      context: ${SETPOINT_DIR:-../setpoint}
      dockerfile: docker/gatewayd.Dockerfile
    environment:
      SITE_CONFIG_PATH: /data/site-config.sim.yml
      GATEWAYD_PROFILES_DIR: /data/profiles
    volumes:
      - ${SETPOINT_DIR:-../setpoint}/gatewayd:/app/gatewayd
      - ${SETPOINT_DIR:-../setpoint}/ticlib:/app/ticlib
    extra_hosts:
      - "host.docker.internal:host-gateway"
